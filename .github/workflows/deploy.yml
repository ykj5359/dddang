name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/restart-with-dddang-JkzsE

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_KAKAO_MAP_KEY: d979f3b1bc33fabb3cfab46e6174d90f
          VITE_LAND_TRADE_KEY: Phkre9DoicHd0pTNbufNEYjyQt3+TkBFcY/j3wpHq4A5Jfp/xx2aXIeKeCF+xoVGUeLjlQVX8rrpcFKsKikldw==
          VITE_VWORLD_KEY: A52CE9F8-406D-3143-8FB0-3499495BC3A3

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
